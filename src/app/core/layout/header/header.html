<header class="w-full flex justify-between items-center px-6 py-4 absolute top-0 left-0 z-10">
  <span routerLink="/posts" class="font-bold text-xl tracking-tight text-[#2A3439] select-none">
    {{ 'common.appName' | transloco }}
  </span>
  <app-language-selector class="ml-auto" />

  <!-- Logout -->
  <button
    (click)="logout()"
    class="rounded px-3 py-1 text-xs font-medium text-gray-500 hover:text-gray-800 transition-colors"
  >
    {{ 'header.logout' | transloco }}
  </button>
</header>
