<header
  class="w-full flex justify-between items-center gap-2 px-4 py-3 sm:gap-4 sm:px-6 sm:py-4 absolute top-0 left-0 z-10"
>
  <!-- Logo -->
  <div>
    <a
      routerLink="/posts"
      class="font-bold text-xl tracking-tight text-[#2A3439] select-none shrink-0"
    >
      {{ 'common.appName' | transloco }}
    </a>
  </div>

  <div class="flex w-full gap-3 items-center justify-end">
    <!-- Search -->
    @if (showSearch()) {
      <app-search [urlSearchPrefix]="'/posts'"></app-search>
    }

    <!-- Right actions -->
    <div class="flex items-center gap-3">
      <app-language-selector />
      <button
        (click)="logout()"
        class="rounded px-3 py-1 text-xs font-medium text-gray-500 hover:text-gray-800 transition-colors cursor-pointer"
      >
        <img src="logout.svg" alt="" aria-hidden="true" class="inline w-4 h-4 mr-1" />
        {{ 'header.logout' | transloco }}
      </button>
    </div>
  </div>
</header>
