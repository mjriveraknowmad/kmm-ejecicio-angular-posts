<div class="bg-[#F0F4F7] rounded-lg px-8 pt-14 pb-12 flex flex-col gap-4">
  <h3 class="text-sm font-bold text-[#2A3439]">
    {{ 'comments.form.title' | transloco }}
  </h3>

  <form (submit)="onSubmit($event)" novalidate class="flex flex-col gap-4">
    <textarea
      [formField]="commentForm.body"
      rows="4"
      [placeholder]="'comments.form.placeholder' | transloco"
      class="w-full rounded bg-white p-4 text-base leading-6 text-[#566166] placeholder:text-[#56616666] resize-none focus:outline-none focus:ring-2 focus:ring-blue-100"
    ></textarea>

    <div class="flex justify-end">
      <button
        type="submit"
        [disabled]="isLoading()"
        class="px-6 py-2.5 rounded text-base font-semibold text-white bg-gradient-to-br from-[#0053DC] to-[#3E76FE] shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition-opacity"
      >
        {{ 'comments.form.submit' | transloco }}
      </button>
    </div>
  </form>
</div>
