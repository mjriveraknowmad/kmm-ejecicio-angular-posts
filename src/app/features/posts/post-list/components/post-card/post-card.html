<article class="bg-white rounded-lg px-5 py-6 sm:px-8 sm:py-8 flex flex-col gap-4">
  <!-- Header: title + date -->
  <div class="flex items-start justify-between gap-4">
    <a
      [routerLink]="['/posts', post().id]"
      class="text-2xl font-bold tracking-[-0.6px] text-[#2A3439] leading-8 hover:text-blue-600 transition-colors line-clamp-2"
    >
      {{ post().title }}
    </a>
    <span class="font-mono text-xs text-[#56616699] shrink-0 mt-1">
      {{ post().createdAt | date: 'MMM yyyy' : undefined : currentLang() | uppercase }}
    </span>
  </div>

  <!-- Body -->
  <p class="text-base leading-relaxed text-[#566166] max-w-3xl line-clamp-2">
    {{ post().body }}
  </p>

  <!-- Footer: author + tags -->
  <div class="flex items-center justify-between pt-2">
    <!-- Author -->
    <div class="flex items-center gap-3">
      <div
        class="flex items-center justify-center w-6 h-6 rounded-full bg-[#D5E3FD] shrink-0"
        aria-hidden="true"
      >
        <span class="text-[10px] font-bold text-[#455367] leading-none select-none">
          {{ initials() }}
        </span>
      </div>
      <span class="text-sm font-semibold text-[#566166]">{{ post().user?.name ?? '' }}</span>
    </div>

    <!-- Tags -->
    <div class="flex items-center gap-1.5 flex-wrap justify-end">
      @for (tag of post().tags; track tag) {
        <span
          class="px-3 py-1 rounded-[12px] text-[10px] font-bold tracking-[0.5px] uppercase bg-[#E8EFF3] text-[#566166]"
        >
          {{ tag }}
        </span>
      }
    </div>
  </div>
</article>
