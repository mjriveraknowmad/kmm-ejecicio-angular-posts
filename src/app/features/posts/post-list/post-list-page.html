<div class="flex flex-col gap-12 max-w-[848px] md:w-[80vw] animate-fade-in-up">
  <!-- Filter bar -->
  <app-post-filters
    [users]="usersResource.value() ?? []"
    [selectedUserId]="selectedUserId()"
    [selectedTag]="tag()"
    [totalCount]="total()"
    [currentCount]="posts().length"
    (authorChange)="onAuthorChange($event)"
    (tagChange)="onTagChange($event)"
  />

  <!-- Post list: loading / error / empty / data -->
  @if (postsResource.isLoading()) {
    <div class="flex justify-center py-16">
      <app-loading-spinner />
    </div>
  } @else if (postsResource.error()) {
    <app-error-state />
  } @else if (!posts().length) {
    <app-empty-state />
  } @else {
    <div class="flex flex-col gap-4 animate-fade-in">
      @for (post of posts(); track post.id) {
        <app-post-card
          [post]="post"
          [currentUserId]="auth.currentUser()?.id"
          (prefetchPost)="onPrefetch($event)"
        />
      }
    </div>

    <!-- Pagination -->
    <app-pagination
      [currentPage]="page()"
      [totalPages]="totalPages()"
      (pageChange)="onPageChange($event)"
    />
  }
</div>
